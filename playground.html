<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground — Grid Composer</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--white:#fff;--border:#dbdbdb;--bl:#efefef;
  --text:#262626;--text2:#737373;--text3:#a8a8a8;
  --r:10px;--rs:7px;--font:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── HEADER ── */
.hdr{height:46px;background:var(--white);border-bottom:1px solid var(--bl);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:8px}
.hdr-title{font-size:13px;font-weight:700}
.ptab{padding:3px 9px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s}
.ptab.on{background:var(--text);border-color:var(--text);color:white}
.xbtn{width:24px;height:24px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:11px;font-family:var(--font);color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── MAIN LAYOUT ── */
.main{display:flex;height:calc(100vh - 46px);overflow:hidden}

/* LEFT column — controls, scrollable */
.col-left{width:220px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bl);display:flex;flex-direction:column;gap:0;background:var(--white)}
.ctrl-block{padding:12px 14px;border-bottom:1px solid var(--bl)}
.ctrl-block:last-child{border-bottom:none;flex:1}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}

/* Chips — wrap dentro do left */
.chips{display:flex;flex-direction:column;gap:4px}
.chip{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1.5px solid var(--bl);background:var(--white);transition:all .1s;line-height:1.3}
.chip:hover{border-color:var(--text2);color:var(--text)}
.chip.on{border-color:var(--text);background:var(--text);color:white}
.chip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* RIGHT column — grid preview + cores */
.col-right{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0;background:var(--bg)}

/* Grid preview block */
.grid-block{background:var(--white);border-bottom:1px solid var(--bl);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:100%;max-width:240px}
.ig-cell{aspect-ratio:4/5;border-radius:3px;transition:background .18s}
.grid-label{font-size:11px;color:var(--text3);text-align:center;line-height:1.5}
.apply-btn{width:100%;max-width:240px;padding:10px;border-radius:var(--rs);background:var(--text);border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.apply-btn:hover{opacity:.85}

/* Cores block */
.cores-block{padding:16px;display:flex;flex-direction:column;gap:12px}
.swatches{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sw{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;transition:all .12s;flex-shrink:0}
.sw:hover{border-color:var(--text);transform:scale(1.08)}
.sw input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border-radius:50%}
.sw .del{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--text);color:white;font-size:7px;display:none;align-items:center;justify-content:center;z-index:2;cursor:pointer;line-height:1}
.sw:hover .del{display:flex}
.add-sw{width:36px;height:36px;border-radius:50%;border:1.5px dashed var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;flex-shrink:0;transition:all .12s}
.add-sw:hover{border-color:var(--text2);color:var(--text)}

/* Add color panel */
.add-panel{background:var(--bg);border:1px solid var(--bl);border-radius:var(--rs);padding:10px;display:none;flex-direction:column;gap:8px}
.add-panel.open{display:flex}
.add-row{display:flex;align-items:center;gap:7px}
.preview-dot{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
input.cpick{width:40px;height:34px;border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;padding:2px;flex-shrink:0}
.hex-in{flex:1;padding:7px 9px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-family:monospace;color:var(--text);background:var(--white);outline:none;min-width:0}
.hex-in:focus{border-color:var(--text)}
.okbtn{padding:7px 12px;background:var(--text);color:white;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);flex-shrink:0}
.cnbtn{padding:7px 10px;background:transparent;border:1.5px solid var(--border);color:var(--text2);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:var(--font);flex-shrink:0}

/* Analysis */
.analysis{border:1px solid var(--bl);border-radius:var(--rs);overflow:hidden;background:var(--white)}
.anal-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--bl)}
.anal-row:last-child{border-bottom:none}
.adot{width:22px;height:22px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .1s}
.adot:hover{transform:scale(1.12);outline:2px solid var(--text)}
.ahex{font-size:11px;font-family:monospace;flex:1;color:var(--text)}
.abadge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.adel{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px}
.adel:hover{color:var(--text)}
.asum{padding:8px 10px;background:var(--bg);font-size:11px;color:var(--text2)}

/* ── MOBILE: stack vertically, grid at bottom ── */
@media(max-width:599px){
  body{overflow:auto}
  .main{flex-direction:column;height:auto;overflow:visible}
  .col-left{width:100%;border-right:none;overflow:visible;height:auto}
  .col-right{height:auto;overflow:visible}
  /* On mobile chips scroll horizontal */
  .chips{flex-direction:row;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;flex-shrink:0}
  /* Grid at bottom on mobile — re-order via order */
  .col-right{display:flex;flex-direction:column}
  .cores-block{order:1}
  .grid-block{order:2;border-top:1px solid var(--bl);border-bottom:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <span class="hdr-title">⬡ Playground</span>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:10px;color:var(--text3)">posts</span>
    <div style="display:flex;gap:3px" id="post-tabs"></div>
    <button class="xbtn" onclick="window.close()">✕</button>
  </div>
</div>

<div class="main">

  <!-- LEFT: controls -->
  <div class="col-left">
    <div class="ctrl-block">
      <div class="sec-title">Harmonia</div>
      <div class="chips" id="harm-list"></div>
    </div>
    <div class="ctrl-block">
      <div class="sec-title">Padrão de grid</div>
      <div class="chips" id="pat-list"></div>
    </div>
    <div class="ctrl-block">
      <div class="sec-title">Eixo de contraste</div>
      <div class="chips" id="axis-list"></div>
    </div>
  </div>

  <!-- RIGHT: grid preview + cores -->
  <div class="col-right">

    <!-- Grid preview -->
    <div class="grid-block">
      <div class="ig-grid" id="ig-grid"></div>
      <div class="grid-label" id="grid-label"></div>
      <button class="apply-btn" onclick="applyAndClose()">✓ Aplicar estas configurações</button>
    </div>

    <!-- Cores -->
    <div class="cores-block">
      <div>
        <div class="sec-title">Paleta de cores</div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="add-panel" id="add-panel">
        <div style="font-size:11px;font-weight:600;color:var(--text2)" id="add-title">Nova cor</div>
        <div class="add-row">
          <div class="preview-dot" id="preview-dot" style="background:#C4853A"></div>
          <input class="cpick" type="color" id="cpick" value="#C4853A" oninput="onPick(this.value)">
          <input class="hex-in" type="text" id="hex-in" value="#C4853A" maxlength="7"
            oninput="onHex(this.value)" placeholder="#RRGGBB">
          <button class="okbtn" onclick="confirmColor()">OK</button>
          <button class="cnbtn" onclick="cancelColor()">✕</button>
        </div>
      </div>
      <div>
        <div class="sec-title">Análise</div>
        <div class="analysis" id="analysis"></div>
      </div>
    </div>

  </div>
</div>

<script>
const ST={selH:'complementary',selP:'checkerboard',selA:'temperature',size:9,editIdx:null,
  palette:['#C4853A','#3A5870','#8A9A4A','#2A4A60','#D05020','#6A8A9A','#1A3850','#B07030']}

const HARMONIES=[
  {id:'complementary',name:'Complementar',dot:'linear-gradient(135deg,#C4853A,#3A5870)'},
  {id:'analogous',    name:'Análogo',     dot:'linear-gradient(135deg,#4A8A9A,#5A8A6A)'},
  {id:'split',        name:'Split Comp.', dot:'linear-gradient(135deg,#C4853A,#3A7870,#3A4A88)'},
  {id:'triad',        name:'Tríade',      dot:'linear-gradient(135deg,#C4853A,#3A7A9A,#8A3A9A)'},
  {id:'monochrome',   name:'Monocromático',dot:'linear-gradient(135deg,#0A2A3A,#4A9AB8)'},
  {id:'shades',       name:'Sombras',     dot:'linear-gradient(135deg,#0A0E12,#1C3040)'},
]
const PATTERNS=[
  {id:'checkerboard',name:'Xadrez'},
  {id:'columns',     name:'Colunas'},
  {id:'rows',        name:'Linhas'},
  {id:'diagonal',    name:'Diagonal'},
]
const AXES=[
  {id:'temperature',name:'Temperatura',icon:'🌡️'},
  {id:'luminance',  name:'Luminância', icon:'☀️'},
  {id:'saturation', name:'Saturação',  icon:'🎨'},
]

function rgb(h){h=h.replace('#','');const n=parseInt(h,16);return[n>>16&255,n>>8&255,n&255]}
function hue(hex){const[r,g,b]=rgb(hex).map(v=>v/255);const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;if(!d)return 0;let h;if(mx===r)h=((g-b)/d+(g<b?6:0))*60;else if(mx===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60;return h}
function lum(hex){const[r,g,b]=rgb(hex).map(v=>v/255);const t=v=>v>.04045?Math.pow((v+.055)/1.055,2.4):v/12.92;return .2126*t(r)+.7152*t(g)+.0722*t(b)}
function sat(hex){const[r,g,b]=rgb(hex).map(v=>v/255);const mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx===0?0:(mx-mn)/mx}
function isWarm(hex){const h=hue(hex);return h<60||h>300}
function isAccent(hex){const h=hue(hex),s=sat(hex);return s>0.45&&(h<=45||h>=330)}
function kelvin(hex){const[r,,b]=rgb(hex);const bs=r*.5-b*.5;if(bs>40)return 2200;if(bs>20)return 3500;if(bs>5)return 4500;if(bs>-5)return 5500;if(bs>-20)return 7000;if(bs>-40)return 8500;return 10000}
function tempWord(hex){if(isAccent(hex))return'acento';const k=kelvin(hex);return k<=4500?'quente':k<=6000?'neutro':'frio'}

function harmScore(hex,hId){
  const h=hue(hex),L=lum(hex)*100,a=isAccent(hex),w=isWarm(hex),k=kelvin(hex)
  switch(hId){
    case'complementary':return{score:a?100-k/100:k/100,group:(a||w)?'A':'B'}
    case'analogous':return{score:h,group:h<180?'A':'B'}
    case'split':case'triad':return{score:h,group:Math.floor(h/120)%2===0?'A':'B'}
    case'monochrome':return{score:L,group:L>55?'A':'B'}
    case'shades':return{score:L,group:L<35?'A':'B'}
    default:{const a=isAccent(hex),k=kelvin(hex);return{score:a?1000+(10000-k):k,group:(a||k<5000)?'A':'B'}}
  }
}
function buildMap(rows,nA,total,pat){
  const map=[],ratio=nA/total
  if(pat==='checkerboard'){
    let rem=nA,rp=[]
    for(let r=0;r<rows;r++){if(rem>=2&&r%2===0){rp.push(2);rem-=2}else if(rem===1){rp.push(1);rem--}else rp.push(0)}
    for(let r=0;r<rows&&rem>0;r++)if(rp[r]===0){if(rem>=2){rp[r]=2;rem-=2}else{rp[r]=1;rem--}}
    for(let r=0;r<rows;r++)for(let c=0;c<3;c++){if(rp[r]===2)map.push(c===1?'B':'A');else if(rp[r]===1)map.push(c===1?'A':'B');else map.push('B')}
  }else if(pat==='columns'){const ac=ratio<0.4?[1]:ratio<0.7?[0,2]:[0,1,2];for(let r=0;r<rows;r++)for(let c=0;c<3;c++)map.push(ac.includes(c)?'A':'B')
  }else if(pat==='rows'){const ar=ratio<0.4?1:ratio<0.7?Math.ceil(rows*.5):rows;for(let r=0;r<rows;r++)for(let c=0;c<3;c++)map.push(r<ar?'A':'B')
  }else if(pat==='diagonal'){for(let r=0;r<rows;r++)for(let c=0;c<3;c++)map.push((r+c)%2===0?'A':'B')}
  return map
}
function computeGrid(){
  const cols=[];for(let i=0;i<ST.size;i++)cols.push(ST.palette[i%ST.palette.length])
  const scored=cols.map(c=>({c,...harmScore(c,ST.selH)}))
  const gA=scored.filter(x=>x.group==='A').sort((a,b)=>b.score-a.score)
  const gB=scored.filter(x=>x.group==='B').sort((a,b)=>b.score-a.score)
  const rows=Math.ceil(ST.size/3),result=new Array(ST.size).fill('#ccc')
  const map=buildMap(rows,gA.length,ST.size,ST.selP);let aiA=0,aiB=0
  for(let vi=0;vi<ST.size;vi++){
    const row=Math.floor(vi/3),col=vi%3,slot=row*3+(2-col),want=map[vi]||'B';let ph
    if(want==='A'&&gA[aiA])ph=gA[aiA++];else if(want==='B'&&gB[aiB])ph=gB[aiB++]
    else if(gA[aiA])ph=gA[aiA++];else if(gB[aiB])ph=gB[aiB++]
    if(ph&&slot<ST.size)result[slot]=ph.c
  }
  return result
}

function render(){
  document.getElementById('post-tabs').innerHTML=[3,6,9].map(n=>
    `<button class="ptab ${n===ST.size?'on':''}" onclick="setSize(${n})">${n}</button>`).join('')

  const cols=computeGrid(),rows=Math.ceil(ST.size/3)
  const grid=document.getElementById('ig-grid')
  grid.style.gridTemplateRows=`repeat(${rows},1fr)`
  grid.innerHTML=cols.map(c=>`<div class="ig-cell" style="background:${c}"></div>`).join('')

  const hN=HARMONIES.find(h=>h.id===ST.selH)?.name
  const pN=PATTERNS.find(p=>p.id===ST.selP)?.name
  const aN=AXES.find(a=>a.id===ST.selA)?.name
  document.getElementById('grid-label').textContent=`${hN} · ${pN} · ${aN}`

  document.getElementById('harm-list').innerHTML=HARMONIES.map(h=>
    `<div class="chip ${h.id===ST.selH?'on':''}" onclick="sel('H','${h.id}')">
      <div class="chip-dot" style="background:${h.dot}"></div>${h.name}
    </div>`).join('')
  document.getElementById('pat-list').innerHTML=PATTERNS.map(p=>
    `<div class="chip ${p.id===ST.selP?'on':''}" onclick="sel('P','${p.id}')">${p.name}</div>`).join('')
  document.getElementById('axis-list').innerHTML=AXES.map(a=>
    `<div class="chip ${a.id===ST.selA?'on':''}" onclick="sel('A','${a.id}')">
      <span style="font-size:12px">${a.icon}</span>${a.name}
    </div>`).join('')

  document.getElementById('swatches').innerHTML=
    ST.palette.map((c,i)=>`
      <div class="sw" style="background:${c}">
        <input type="color" value="${c}" onchange="editDirect(${i},this.value)">
        <div class="del" onclick="event.stopPropagation();removeSw(${i})">✕</div>
      </div>`).join('')+
    `<div class="add-sw" onclick="showAdd()">+</div>`

  const acc=ST.palette.filter(isAccent).length
  const warm=ST.palette.filter(c=>!isAccent(c)&&isWarm(c)).length
  const cool=ST.palette.filter(c=>!isWarm(c)).length
  const neut=ST.palette.length-acc-warm-cool
  document.getElementById('analysis').innerHTML=
    ST.palette.map((c,i)=>{
      const tw=tempWord(c)
      const bg=tw==='acento'?'#fff3e0':tw==='quente'?'#fff8ec':tw==='neutro'?'#f3f4f6':'#e3f2fd'
      const fg=tw==='acento'?'#e65100':tw==='quente'?'#b06000':tw==='neutro'?'#4b5563':'#1565c0'
      return `<div class="anal-row">
        <div class="adot" style="background:${c}" onclick="editSw(${i})" title="Editar"></div>
        <span class="ahex">${c.toUpperCase()}</span>
        <span class="abadge" style="background:${bg};color:${fg}">${tw}</span>
        <span class="adel" onclick="removeSw(${i})">✕</span>
      </div>`
    }).join('')+
    `<div class="asum">Acentos <b>${acc}</b> · Quentes <b>${warm}</b> · Neutros <b>${neut}</b> · Frios <b>${cool}</b></div>`
}

function sel(t,id){if(t==='H')ST.selH=id;else if(t==='P')ST.selP=id;else ST.selA=id;render()}
function setSize(n){ST.size=n;render()}
function removeSw(i){if(ST.palette.length>2){ST.palette.splice(i,1);render()}}
function editDirect(i,v){ST.palette[i]=v;render()}

function showAdd(){
  ST.editIdx=null
  setPanel('#C4853A','Nova cor')
  document.getElementById('add-panel').classList.add('open')
}
function editSw(i){
  ST.editIdx=i
  setPanel(ST.palette[i],'Editar cor')
  document.getElementById('add-panel').classList.add('open')
}
function setPanel(c,title){
  document.getElementById('preview-dot').style.background=c
  document.getElementById('cpick').value=c
  document.getElementById('hex-in').value=c
  document.getElementById('add-title').textContent=title
}
function cancelColor(){document.getElementById('add-panel').classList.remove('open');ST.editIdx=null}
function onPick(v){document.getElementById('preview-dot').style.background=v;document.getElementById('hex-in').value=v}
function onHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){document.getElementById('preview-dot').style.background=v;document.getElementById('cpick').value=v}}
function confirmColor(){
  const v=document.getElementById('hex-in').value
  if(!/^#[0-9a-fA-F]{6}$/.test(v))return
  if(ST.editIdx!=null)ST.palette[ST.editIdx]=v
  else if(ST.palette.length<12)ST.palette.push(v)
  cancelColor();render()
}

function applyAndClose(){
  if(window.opener&&!window.opener.closed)
    window.opener.pgApplyFromPlayground(ST.selH,ST.selP,ST.selA)
  window.close()
}

render()
</script>
</body>
</html>
