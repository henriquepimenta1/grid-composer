<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridAI — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/i18n.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--white:#fff;--border:#dbdbdb;--border-light:#efefef;
  --text:#262626;--text2:#737373;--text3:#a8a8a8;
  --blue:#0095f6;--green:#27ae60;--red:#ed4956;
  --ig:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  --shadow-md:0 8px 32px rgba(0,0,0,.12);
  --r:10px;--r-sm:7px;--font:'Plus Jakarta Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}

.card{width:100%;max-width:380px;background:var(--white);border:1px solid var(--border-light);border-radius:var(--r);box-shadow:var(--shadow-md);overflow:hidden;position:relative}

.lang-btn{position:absolute;top:12px;right:12px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:var(--font);color:var(--text2)}

.card-logo{padding:32px 32px 24px;text-align:center;border-bottom:1px solid var(--border-light)}
.logo{font-size:28px;font-weight:800;background:var(--ig);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;display:inline-block;margin-bottom:6px}
.logo-sub{font-size:13px;color:var(--text2);font-weight:500}

.tabs{display:flex;border-bottom:1px solid var(--border-light)}
.tab-btn{flex:1;padding:14px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}

.form-body{padding:24px}
.field{margin-bottom:14px}
.field-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.field-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--font);color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--text)}
.field-input::placeholder{color:var(--text3)}

.submit-btn{width:100%;padding:12px;margin-top:6px;border-radius:var(--r-sm);background:var(--ig);border:none;color:white;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font);transition:opacity .15s}
.submit-btn:hover:not(:disabled){opacity:.88}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-btn:active:not(:disabled){transform:scale(.99)}

.divider{display:flex;align-items:center;gap:10px;margin:18px 0}
.div-line{flex:1;height:1px;background:var(--border-light)}
.div-txt{font-size:12px;color:var(--text3);white-space:nowrap}

.google-btn{width:100%;padding:11px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font);color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.google-btn:hover{background:var(--bg);border-color:#aaa}
.google-icon{width:18px;height:18px;flex-shrink:0}

.msg{display:none;padding:10px 12px;border-radius:var(--r-sm);font-size:13px;line-height:1.5;margin-bottom:14px}
.msg.show{display:block}
.msg.error{background:#fff5f5;border:1px solid #fca5a5;color:var(--red)}
.msg.success{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.msg.info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}

.forgot{text-align:right;margin-top:-8px;margin-bottom:14px}
.forgot a{font-size:12px;color:var(--blue);text-decoration:none;cursor:pointer}

.card-footer{padding:16px 32px;border-top:1px solid var(--border-light);text-align:center;font-size:12px;color:var(--text3)}
.card-footer a{color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.pw-strength{margin-top:6px;display:none}
.pw-strength.show{display:block}
.pw-bar{height:3px;border-radius:2px;transition:all .3s;margin-bottom:4px}
.pw-label{font-size:11px}

.terms-note{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.5}
.terms-note a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<div class="card">
  <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">🇧🇷 PT</button>

  <div class="card-logo">
    <div class="logo">GridAI</div>
    <div class="logo-sub" data-i18n="app_tagline">Planejamento inteligente de grid</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login"  onclick="switchTab('login')"  data-i18n="login_tab">Entrar</button>
    <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')" data-i18n="signup_tab">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <div id="form-login" class="form-body">
    <div class="msg" id="login-msg"></div>
    <div class="field">
      <label class="field-label" data-i18n="email_label">E-mail</label>
      <input class="field-input" id="login-email" type="email" autocomplete="email"
        data-i18n="email_placeholder" data-i18n-attr="placeholder" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label class="field-label" data-i18n="password_label">Senha</label>
      <input class="field-input" id="login-password" type="password" autocomplete="current-password"
        data-i18n="password_placeholder" data-i18n-attr="placeholder" placeholder="••••••••">
    </div>
    <div class="forgot"><a onclick="showForgot()" data-i18n="forgot_password">Esqueci minha senha</a></div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()" data-i18n="login_btn">Entrar</button>
    <div class="divider">
      <div class="div-line"></div>
      <span class="div-txt" data-i18n="or_continue">ou continue com</span>
      <div class="div-line"></div>
    </div>
    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span data-i18n="google_btn">Continuar com Google</span>
    </button>
  </div>

  <!-- SIGNUP -->
  <div id="form-signup" class="form-body" style="display:none">
    <div class="msg" id="signup-msg"></div>
    <div class="field">
      <label class="field-label" data-i18n="name_label">Nome</label>
      <input class="field-input" id="signup-name" type="text" autocomplete="name"
        data-i18n="name_placeholder" data-i18n-attr="placeholder" placeholder="Seu nome">
    </div>
    <div class="field">
      <label class="field-label" data-i18n="email_label">E-mail</label>
      <input class="field-input" id="signup-email" type="email" autocomplete="email"
        data-i18n="email_placeholder" data-i18n-attr="placeholder" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label class="field-label" data-i18n="password_label">Senha</label>
      <input class="field-input" id="signup-password" type="password" autocomplete="new-password"
        data-i18n="new_password_placeholder" data-i18n-attr="placeholder"
        placeholder="mínimo 8 caracteres" oninput="checkPwStrength(this.value)">
      <div class="pw-strength" id="pw-strength">
        <div class="pw-bar" id="pw-bar"></div>
        <div class="pw-label" id="pw-label"></div>
      </div>
    </div>
    <button class="submit-btn" id="signup-btn" onclick="doSignup()" data-i18n="signup_btn">Criar conta grátis</button>
    <div class="divider">
      <div class="div-line"></div>
      <span class="div-txt" data-i18n="or_continue">ou continue com</span>
      <div class="div-line"></div>
    </div>
    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"/>
      </svg>
      <span data-i18n="google_btn">Continuar com Google</span>
    </button>
    <div class="terms-note">
      <span data-i18n="terms_note">Ao criar conta você concorda com os</span>
      <a href="#" data-i18n="terms_link">Termos de Uso</a> e
      <a href="#" data-i18n="privacy_link">Política de Privacidade</a>
    </div>
  </div>

  <div class="card-footer" id="card-footer">
    <span data-i18n="footer_new">Novo por aqui?</span>
    <a onclick="switchTab('signup')" data-i18n="footer_create">Crie sua conta grátis →</a>
  </div>
</div>

<script>
const SUPABASE_URL      = '__SUPABASE_URL__'
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Redirect if already logged in
;(async () => {
  const { data: { session } } = await sb.auth.getSession()
  if (session) window.location.replace('/app')
})()

function switchTab(tab) {
  const isLogin = tab === 'login'
  document.getElementById('tab-login').className  = 'tab-btn' + (isLogin  ? ' active' : '')
  document.getElementById('tab-signup').className = 'tab-btn' + (!isLogin ? ' active' : '')
  document.getElementById('form-login').style.display  = isLogin  ? 'block' : 'none'
  document.getElementById('form-signup').style.display = !isLogin ? 'block' : 'none'
  // Re-apply i18n on tab switch
  applyTranslations()
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const btn = document.getElementById('login-btn')
  const msg = document.getElementById('login-msg')
  if (!email || !password) { showMsg(msg, 'Preencha e-mail e senha.', 'error'); return }
  setLoading(btn, true, 'Entrando...')
  hideMsg(msg)
  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) {
    setLoading(btn, false, t('login_btn'))
    const map = {
      'Invalid login credentials': t('err_invalid_credentials'),
      'Email not confirmed':        t('err_email_not_confirmed'),
      'Too many requests':          t('err_too_many_requests'),
    }
    showMsg(msg, map[error.message] || error.message, 'error')
  } else {
    showMsg(msg, t('login_success'), 'success')
    setTimeout(() => window.location.replace('/app'), 1000)
  }
}

async function doSignup() {
  const name     = document.getElementById('signup-name').value.trim()
  const email    = document.getElementById('signup-email').value.trim()
  const password = document.getElementById('signup-password').value
  const btn = document.getElementById('signup-btn')
  const msg = document.getElementById('signup-msg')
  if (!name)             { showMsg(msg, t('fill_name'), 'error'); return }
  if (!email)            { showMsg(msg, t('fill_email'), 'error'); return }
  if (password.length<8) { showMsg(msg, t('fill_password_min'), 'error'); return }
  setLoading(btn, true, 'Criando...')
  hideMsg(msg)
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { name }, emailRedirectTo: window.location.origin + '/app' }
  })
  setLoading(btn, false, t('signup_btn'))
  if (error) {
    const map = { 'User already registered': t('err_already_registered') }
    showMsg(msg, map[error.message] || error.message, 'error')
  } else {
    showMsg(msg, t('signup_success'), 'success')
    document.getElementById('signup-btn').disabled = true
  }
}

async function doGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app' }
  })
  if (error) alert('Erro: ' + error.message)
}

async function showForgot() {
  const email = document.getElementById('login-email').value.trim()
  const msg   = document.getElementById('login-msg')
  if (!email) {
    showMsg(msg, t('forgot_hint'), 'info')
    document.getElementById('login-email').focus()
    return
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password'
  })
  if (error) showMsg(msg, 'Erro: ' + error.message, 'error')
  else showMsg(msg, t('reset_sent') + ' ' + email, 'success')
}

function checkPwStrength(pw) {
  const el  = document.getElementById('pw-strength')
  const bar = document.getElementById('pw-bar')
  const lbl = document.getElementById('pw-label')
  if (!pw) { el.classList.remove('show'); return }
  el.classList.add('show')
  let score = 0
  if (pw.length >= 8)            score++
  if (pw.length >= 12)           score++
  if (/[A-Z]/.test(pw))         score++
  if (/[0-9]/.test(pw))         score++
  if (/[^A-Za-z0-9]/.test(pw)) score++
  const levels = [
    { color:'#ef4444', key:'pw_very_weak', w:'20%' },
    { color:'#f97316', key:'pw_weak',      w:'40%' },
    { color:'#eab308', key:'pw_medium',    w:'60%' },
    { color:'#22c55e', key:'pw_strong',    w:'80%' },
    { color:'#16a34a', key:'pw_very_strong',w:'100%'},
  ]
  const lvl = levels[Math.min(score, 4)]
  bar.style.background = lvl.color
  bar.style.width      = lvl.w
  lbl.textContent      = t(lvl.key)
  lbl.style.color      = lvl.color
}

function setLoading(btn, loading, label) {
  btn.disabled  = loading
  btn.innerHTML = loading ? `<span class="spinner"></span>${label}` : label
}
function showMsg(el, text, type) { el.textContent = text; el.className = `msg ${type} show` }
function hideMsg(el) { el.classList.remove('show') }

// Init
setLang(LANG)

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return
  const loginVisible = document.getElementById('form-login').style.display !== 'none'
  if (loginVisible) doLogin(); else doSignup()
})
</script>
</body>
</html>
